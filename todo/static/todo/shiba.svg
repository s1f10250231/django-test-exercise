<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <radialGradient id="f" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f6d9b3"/>
      <stop offset="60%" stop-color="#e39d6a"/>
      <stop offset="100%" stop-color="#a45f33"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="none"/>
  <!-- face base -->
  <ellipse cx="300" cy="330" rx="200" ry="190" fill="url(#f)" stroke="#6b3f1a" stroke-width="8"/>
  <!-- ears -->
  <path d="M120 150 C80 70, 160 40, 210 140" fill="#e79f6a" stroke="#6b3f1a" stroke-width="8"/>
  <path d="M480 150 C520 70, 440 40, 390 140" fill="#e79f6a" stroke="#6b3f1a" stroke-width="8"/>
  <!-- inner ear shadows -->
  <path d="M150 160 C130 120, 170 100, 200 150" fill="#f5caa1" opacity="0.9"/>
  <path d="M450 160 C470 120, 430 100, 400 150" fill="#f5caa1" opacity="0.9"/>
  <!-- eyes -->
  <ellipse cx="235" cy="320" rx="28" ry="36" fill="#2b1b10"/>
  <ellipse cx="365" cy="320" rx="28" ry="36" fill="#2b1b10"/>
  <circle cx="245" cy="310" r="8" fill="#fff" opacity="0.7"/>
  <circle cx="375" cy="310" r="8" fill="#fff" opacity="0.7"/>
  <!-- muzzle -->
  <path d="M250 380 Q300 420, 350 380 Q300 420, 250 380 Z" fill="#fff"/>
  <path d="M300 370 Q310 380, 300 390 Q290 380, 300 370 Z" fill="#2b1b10"/>
  <!-- nose and mouth -->
  <path d="M300 380 Q295 393, 290 400" stroke="#2b1b10" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M300 380 Q305 393, 310 400" stroke="#2b1b10" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- cheek blush -->
  <circle cx="190" cy="370" r="20" fill="#ffd6c0" opacity="0.5"/>
  <circle cx="410" cy="370" r="20" fill="#ffd6c0" opacity="0.5"/>
</svg>
