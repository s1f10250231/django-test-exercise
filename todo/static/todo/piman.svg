<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <!-- Simple cartoon green pepper character (ピーマンマン) -->
  <defs>
    <linearGradient id="g1" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#7be26a"/>
      <stop offset="100%" stop-color="#35a02a"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="none"/>
  <!-- body -->
  <ellipse cx="300" cy="340" rx="160" ry="200" fill="url(#g1)" stroke="#2f6b22" stroke-width="8"/>
  <!-- top stem -->
  <path d="M260 120 C260 80, 340 80, 340 120 C320 110, 280 110, 260 120 Z" fill="#22591a"/>
  <path d="M295 85 C280 70, 320 70, 305 85 Z" fill="#22591a"/>
  <!-- eyes -->
  <ellipse cx="245" cy="320" rx="24" ry="30" fill="#fff"/>
  <ellipse cx="355" cy="320" rx="24" ry="30" fill="#fff"/>
  <circle cx="250" cy="320" r="8" fill="#2b1b10"/>
  <circle cx="360" cy="320" r="8" fill="#2b1b10"/>
  <!-- mouth -->
  <path d="M250 400 Q300 440, 350 400" stroke="#1f3b17" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- rosy cheeks -->
  <circle cx="200" cy="360" r="14" fill="#ffd6c0" opacity="0.6"/>
  <circle cx="400" cy="360" r="14" fill="#ffd6c0" opacity="0.6"/>
</svg>
