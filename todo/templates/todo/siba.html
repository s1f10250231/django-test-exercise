{% load static %}
<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>柴犬ゲーム</title>
    <link rel="stylesheet" href="{% static 'todo/style.css' %}">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
      .controls { position: absolute; right: 12px; top: 12px; z-index: 1100; }
      .controls a { color: var(--text); background: rgba(0,0,0,0.25); padding:8px 12px; border-radius:8px; }
    </style>
  </head>
  <body>
    <div class="siba-container" id="game">
      <div class="minesweeper-layer" id="minefield" aria-label="マインスイーパー"></div>
      <div class="siba-hint">クリックでキャラクターを消そう — 全て消えると再出現します</div>
      <div class="controls"><a href="{% url 'index' %}">戻る</a></div>
    </div>

    <script>
      (() => {
        const container = document.getElementById('game');
        const minefield = document.getElementById('minefield');
        let mineGrid = [];
        let revealedCells = 0;
        let gameOver = false;
        const IMAGES = [
          {src: '{% static "todo/shiba.svg" %}', name: '柴犬', behavior: 'static'},
          {src: '{% static "todo/piman.svg" %}', name: 'ピーマンマン', behavior: 'static'},
          {src: '{% static "todo/gorilla.svg" %}', name: 'ゴリラ男爵', behavior: 'static'},
          {src: '{% static "todo/saba.svg" %}', name: '鯖男', behavior: 'static'},
          {src: '{% static "todo/umeboshi.svg" %}', name: '梅干し女卑', behavior: 'static'},
          {src: '{% static "todo/eyeball.svg" %}', name: '目玉', behavior: 'wander'},
          {src: '{% static "todo/pen.svg" %}', name: '金色の鎖付きペン', behavior: 'swing'},
          {src: '{% static "todo/ledger.svg" %}', name: '紫色の帳簿', behavior: 'drift'},
          {src: '{% static "todo/ringbox.svg" %}', name: '白い箱の指輪', behavior: 'hop'}
        ];

        function rand(min, max) { return Math.random() * (max - min) + min; }

        function countAdjacentMines(row, col, rows, cols) {
          let count = 0;
          for (let r = Math.max(0, row - 1); r <= Math.min(rows - 1, row + 1); r++) {
            for (let c = Math.max(0, col - 1); c <= Math.min(cols - 1, col + 1); c++) {
              if (r === row && c === col) continue;
              if (mineGrid[r][c] === 'mine') count++;
            }
          }
          return count;
        }

        function revealAllMines() {
          const rows = mineGrid.length;
          const cols = mineGrid[0].length;
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              if (mineGrid[r][c] !== 'mine') continue;
              const idx = r * cols + c;
              const cell = minefield.children[idx];
              if (!cell) continue;
              cell.classList.add('is-revealed', 'is-mine');
              cell.textContent = '💣';
            }
          }
        }

        function floodReveal(row, col) {
          const rows = mineGrid.length;
          const cols = mineGrid[0].length;
          const stack = [[row, col]];

          while (stack.length) {
            const [r, c] = stack.pop();
            if (r < 0 || c < 0 || r >= rows || c >= cols) continue;
            const idx = r * cols + c;
            const cell = minefield.children[idx];
            if (!cell || cell.classList.contains('is-revealed')) continue;

            const value = mineGrid[r][c];
            cell.classList.add('is-revealed');
            revealedCells++;

            if (value === 0) {
              cell.textContent = '';
              for (let rr = Math.max(0, r - 1); rr <= Math.min(rows - 1, r + 1); rr++) {
                for (let cc = Math.max(0, c - 1); cc <= Math.min(cols - 1, c + 1); cc++) {
                  if (rr === r && cc === c) continue;
                  if (mineGrid[rr][cc] !== 'mine') stack.push([rr, cc]);
                }
              }
            } else {
              cell.textContent = value;
            }
          }

          const safeCells = mineGrid.flat().filter((value) => value !== 'mine').length;
          if (revealedCells >= safeCells) {
            gameOver = true;
            minefield.classList.add('is-clear');
          }
        }

        function revealMineCell(row, col) {
          if (gameOver) return;
          const value = mineGrid[row][col];
          const idx = row * mineGrid[0].length + col;
          const cell = minefield.children[idx];
          if (!cell || cell.classList.contains('is-revealed')) return;

          if (value === 'mine') {
            cell.classList.add('is-revealed', 'is-mine');
            cell.textContent = '💣';
            gameOver = true;
            revealAllMines();
            return;
          }

          floodReveal(row, col);
        }

        function buildMinesweeper() {
          const rect = container.getBoundingClientRect();
          const cols = Math.max(8, Math.floor(rect.width / 36));
          const rows = Math.max(6, Math.floor(rect.height / 36));
          const mineCount = Math.max(10, Math.floor(rows * cols * 0.14));

          minefield.innerHTML = '';
          minefield.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;
          minefield.style.gridTemplateRows = `repeat(${rows}, minmax(0, 1fr))`;
          minefield.classList.remove('is-clear');
          mineGrid = Array.from({ length: rows }, () => Array(cols).fill(0));
          revealedCells = 0;
          gameOver = false;

          const mines = new Set();
          while (mines.size < mineCount) {
            const r = Math.floor(Math.random() * rows);
            const c = Math.floor(Math.random() * cols);
            mines.add(`${r}-${c}`);
          }

          mines.forEach((pos) => {
            const [r, c] = pos.split('-').map(Number);
            mineGrid[r][c] = 'mine';
          });

          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              if (mineGrid[r][c] === 'mine') continue;
              mineGrid[r][c] = countAdjacentMines(r, c, rows, cols);
            }
          }

          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              const cell = document.createElement('button');
              cell.type = 'button';
              cell.className = 'mine-cell';
              cell.addEventListener('click', () => revealMineCell(r, c));
              minefield.appendChild(cell);
            }
          }
        }

        function spawnMany() {
          // For each type, spawn 1..3
          IMAGES.forEach(img => {
            const count = Math.floor(rand(1,4)); // 1..3
            for (let i=0;i<count;i++) spawnOne(img.src, img.name);
          });
        }

        function spawnOne(src, name, behavior='static') {
          const el = document.createElement('img');
          el.src = src;
          el.alt = name;
          el.dataset.type = name;
          el.className = 'siba-head';
          el.dataset.behavior = behavior;
          // random size in px
          const size = Math.round(rand(64, 220));
          el.style.width = size + 'px';
          el.style.height = 'auto';
          // random rotation
          const rot = rand(-25,25);
          // random position, ensure within viewport
          const padding = 8;
          const cw = container.clientWidth;
          const ch = container.clientHeight;
          const maxX = Math.max(0, cw - size - padding);
          const maxY = Math.max(0, ch - size - padding);
          const x = Math.round(rand(padding, maxX));
          const y = Math.round(rand(64, maxY));
          el.style.left = x + 'px';
          el.style.top = y + 'px';
          el.style.transform = `rotate(${rot}deg)`;
          el.style.zIndex = Math.floor(rand(1,900));

          el.addEventListener('click', (e) => {
            // clear any timers
            if (el._timer) { clearInterval(el._timer); }
            if (el._hopTimer) { clearInterval(el._hopTimer); }
            if (el._wanderTimer) { clearInterval(el._wanderTimer); }
            el.style.opacity = '0';
            setTimeout(() => { el.remove(); checkRespawn(); }, 140);
          }, {passive:true});

          el.addEventListener('touchstart', (e) => { e.preventDefault(); el.click(); }, {passive:false});

          container.appendChild(el);

          // start behavior
          startBehavior(el, behavior);
        }

        function startBehavior(el, behavior) {
          if (behavior === 'swing') {
            el.classList.add('swing');
          } else if (behavior === 'drift') {
            el.classList.add('drift');
          } else if (behavior === 'hop') {
            // periodic hops
            el._hopTimer = setInterval(() => {
              el.classList.add('hop');
              setTimeout(() => el.classList.remove('hop'), 800);
            }, Math.floor(rand(900, 2200)));
          } else if (behavior === 'wander') {
            // gentle wandering: pick new position every 1.2-2.4s
            el.style.transition = 'left 1.4s ease, top 1.4s ease, transform 0.6s ease';
            el._wanderTimer = setInterval(() => {
              const size = el.getBoundingClientRect().width;
              const padding = 8;
              const cw = container.clientWidth;
              const ch = container.clientHeight;
              const maxX = Math.max(0, cw - size - padding);
              const maxY = Math.max(0, ch - size - padding);
              const x = Math.round(rand(padding, maxX));
              const y = Math.round(rand(64, maxY));
              el.style.left = x + 'px';
              el.style.top = y + 'px';
              el.style.transform = `rotate(${rand(-18,18)}deg)`;
            }, Math.floor(rand(1200, 2400)));
          }
        }

        function checkRespawn() {
          const remaining = container.querySelectorAll('.siba-head').length;
          if (remaining === 0) {
            setTimeout(spawnMany, 700);
          }
        }

        // initial spawn after small delay to allow layout
        window.addEventListener('load', () => {
          setTimeout(() => {
            buildMinesweeper();
            spawnMany();
          }, 200);
        });
        // respawn on resize if none remain
        window.addEventListener('resize', () => {
          buildMinesweeper();
          if (container.querySelectorAll('.siba-head').length === 0) spawnMany();
        });
      })();
    </script>
  </body>
</html>
