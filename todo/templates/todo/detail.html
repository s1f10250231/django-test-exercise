{% load static %}
<!DOCTYPE html>
<html lang="ja">

  <head>
    <title>To Do Application</title>
    <meta charset="UTF-8">
    <meta name="author" content="INIAD">
    <link rel="stylesheet" href="{% static 'todo/style.css' %}">
  </head>

  <body>
    <button class="theme-toggle" type="button" aria-pressed="false">
      <span class="theme-toggle-icon" aria-hidden="true">🌙</span>
      <span class="theme-toggle-label">ライトモードに切り替える</span>
    </button>
    <div class="container">
    <h1>{{ task.title }}</h1>
    <ul>
      <li>Posted at: {{ task.posted_at }}</li>
      {% if task.due_at %}
      <li>Due at: {{ task.due_at }}</li>
      {% endif %}
      {% if task.completed %}
      <li>Status: Completed</li>
      {% else %}
      <li>Status: Not Completed</li>
      {% endif %}
    </ul>

    <div class="links">
      <a href="{% url 'index' %}">Top</a>
      <a href="{% url 'update' task.id %}">Edit</a>
      <a href="{% url "delete" task.id %}">Delete</a>
    </div>
    </div>
    <script src="{% static 'todo/theme.js' %}"></script>
  </body>

</html>
